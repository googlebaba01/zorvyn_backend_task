# Render.com Deployment Configuration

# Web Service Configuration
services:
  - type: web
    name: finance-data-api
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn finance_api.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_PATH
        sync: false
      - key: JWT_ACCESS_TOKEN_LIFETIME
        sync: false
      - key: JWT_REFRESH_TOKEN_LIFETIME
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
